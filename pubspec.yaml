name: argocd_mobile
description: ArgoCD mobile client for shopup.center
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.1

  # WebView for SSO login
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Shared prefs for non-sensitive settings
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
